<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeepFlow</title>
<style>
  :root{color-scheme:dark light}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0a1628;color:#e5e7eb}
  .card{max-width:420px;width:100%;padding:32px 28px}
  h1{font-size:22px;margin:0 0 6px}
  p{color:#9ca3af;font-size:13px;margin:0 0 24px}
  a{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:10px;
    border-radius:10px;background:#111f38;border:1px solid #1e3a5f;color:#e5e7eb;
    text-decoration:none;font-weight:600;font-size:14px}
  a:hover{border-color:#4f8fff}
  span.arr{color:#4f8fff}
</style>
</head>
<body>
  <div class="card">
    <h1>⚡ DeepFlow</h1>
    <p>Select an app</p>
    <a href="office/">Office App <span class="arr">→</span></a>
    <a href="engineer/">Employee App <span class="arr">→</span></a>
    <a href="portal/">Client Portal <span class="arr">→</span></a>
  </div>
</body>
</html>
